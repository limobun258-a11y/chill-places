<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>店家景點總表</title>
<style>
  :root {
    --bg: #fafafa; --card-bg:#fff; --text:#1a1a1a; --muted:#666;
    --tile-food:#fde8d7; --tile-scene:#d9eac9; --tile-kid:#d8e8f5; --tile-cafe:#eaddf0;
    --tile-zero-bg:#ececec; --tile-zero-text:#aaa; --border:#ccc; --accent:#2a6f4d;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#181818; --card-bg:#242424; --text:#eee; --muted:#aaa;
      --tile-food:#5a4326; --tile-scene:#2f4a2f; --tile-kid:#2a3f52; --tile-cafe:#3d2f4a;
      --tile-zero-bg:#2b2b2b; --tile-zero-text:#666; --border:#444; --accent:#7fd9a8; }
  }
  * { box-sizing: border-box; }
  body { font-family: "Microsoft JhengHei","PingFang TC",sans-serif; background:var(--bg); color:var(--text); margin:0; padding:24px; }
  h1 { font-size:22px; margin:0 0 16px; }
  .back-link { display:inline-block; margin-bottom:16px; cursor:pointer; color:var(--accent); font-size:16px; font-weight:bold; text-decoration:none; }
  .back-link:hover { text-decoration:underline; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .tile { border:2px solid var(--border); border-radius:12px; padding:20px 12px; text-align:center; cursor:pointer; background:var(--card-bg); transition:transform .1s; min-height:110px; display:flex; flex-direction:column; justify-content:center; }
  .tile:hover { transform:scale(1.03); box-shadow:0 2px 10px rgba(0,0,0,.15); }
  .tile .name { font-size:22px; font-weight:bold; margin-bottom:8px; }
  .tile .count { font-size:14px; color:var(--muted); }
  .tile.zero { cursor:default; background:var(--tile-zero-bg); color:var(--tile-zero-text); }
  .tile.zero:hover { transform:none; box-shadow:none; }
  .tile.zero .name { color:var(--tile-zero-text); }
  .tile.type-景觀 { background:var(--tile-scene); }
  .tile.type-美食 { background:var(--tile-food); }
  .tile.type-親子景點 { background:var(--tile-kid); }
  .tile.type-咖啡廳 { background:var(--tile-cafe); }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .card { border:1px solid var(--border); border-radius:10px; padding:16px; background:var(--card-bg); }
  .card .cname { font-size:18px; font-weight:bold; margin-bottom:8px; outline:none; }
  .card .field { font-size:13px; margin:4px 0; line-height:1.5; }
  .card .field b { color:var(--accent); }
  .card [contenteditable="true"] { outline:none; border-bottom:1px dashed transparent; }
  .card [contenteditable="true"]:hover { border-bottom:1px dashed var(--accent); }
  .card [contenteditable="true"]:focus { border-bottom:1px solid var(--accent); background:rgba(127,217,168,.08); }
  .toolbar { position:sticky; top:0; background:var(--bg); padding:10px 0; margin-bottom:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; z-index:10; border-bottom:1px solid var(--border); }
  button { font-family:inherit; font-size:14px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); color:var(--text); cursor:pointer; }
  button:hover { background:var(--accent); color:#fff; }
  #saveStatus { font-size:13px; color:var(--muted); }
  .pageBar { margin:16px 0; display:flex; gap:12px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:16px; }
  input[type=file] { font-size:13px; }
  .hint { font-size:12px; color:var(--muted); width:100%; }
  @media (max-width: 480px) {
    body { padding:12px; }
    h1 { font-size:19px; }
    .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .tile { padding:16px 8px; min-height:90px; }
    .tile .name { font-size:18px; }
    .card-grid { grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
    button { padding:10px 12px; font-size:15px; }
    .back-link { font-size:17px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button id="btnSave">下載目前資料(JSON)</button>
  <button id="btnSaveCsv">下載目前資料(CSV)</button>
  <button id="btnCopy">複製 JSON 到剪貼簿</button>
  <label style="font-size:13px;">匯入先前存的 JSON: <input type="file" id="fileImport" accept=".json"></label>
  <span id="saveStatus"></span>
  <span class="hint">iOS/iPad 若「下載」沒反應,請改用「複製 JSON 到剪貼簿」,再貼到備忘錄或雲端筆記保存。</span>
</div>

"feat":"平地森林騎腳踏車、藝術裝置「同在」、Color Walk集點活動","price":"免費","env":"筆直林蔭大道似北海道富良野","who":"適合喜歡騎腳踏車賞森林景觀的人","source":"20260629 - https://www.youtube.com/watch?v=ZDnwFhAbf1I"},{"name":"磚窯居","region_raw":"花蓮縣","type":"景觀","feat":"老磚窯改建房型、隧道窯/八卦窯歷史建築(70年)、手工麵包早餐","price":"","env":"磚窯廠保留原貌，被登錄歷史建築","who":"適合喜歡懷舊建築住宿體驗的人","source":"20260629 - https://www.youtube.com/watch?v=ZDnwFhAbf1I"},{"name":"羅山大自然農家(泥火山豆腐DIY)","region_raw":"花蓮縣","type":"景觀","feat":"泥火山水製豆腐DIY、現磨豆漿、油潑辣子/豆腐乳","price":"","env":"板塊交界特殊泥火山地質，可體驗食農教育","who":"適合想體驗食農教育、親手做豆腐的家庭","source":"20260629 - https://www.youtube.com/watch?v=ZDnwFhAbf1I"}]</script>
<script>
const TYPES = ["景觀","美食","親子景點","咖啡廳"];
const REGIONS = ["台北市","新北市","基隆市","桃園市","新竹市","新竹縣","苗栗縣","台中市","彰化縣","台南市","高雄市","宜蘭縣","花蓮縣","台東縣","泰國","日本","韓國","其他地區"];
const FIELD_LABELS = { feat:"特色", price:"價格", env:"環境", who:"適合對象", source:"來源" };

let DATA = JSON.parse(document.getElementById('data-store').textContent);
// try restore from localStorage (edits persist across reloads in same browser)
try {
  const saved = localStorage.getItem('places_data_edited');
  if (saved) DATA = JSON.parse(saved);
} catch(e) {}

let state = { view:'home', type:null, region:null };
const app = document.getElementById('app');

function persist() {
  try { localStorage.setItem('places_data_edited', JSON.stringify(DATA)); } catch(e) {}
  const el = document.getElementById('saveStatus');
  el.textContent = '已自動暫存於瀏覽器(尚未下載檔案)';
  setTimeout(()=>{ el.textContent=''; }, 2000);
}

function countFor(type, region) {
  return DATA.filter(r => r.type===type && r.region_raw===region).length;
}
function rowsFor(type, region) {
  return DATA.map((r,i)=>({...r, _idx:i})).filter(r => r.type===type && r.region_raw===region);
}

function renderHome() {
  let html = '<h1>店家/景點總表 — 請先選類型</h1><div class="grid">';
  for (const t of TYPES) {
    const cnt = DATA.filter(r=>r.type===t).length;
    html += `<div class="tile type-${t}" data-type="${t}"><div class="name">${t}</div><div class="count">共 ${cnt} 筆</div></div>`;
  }
  html += '</div>';
  app.innerHTML = html;
  app.querySelectorAll('.tile[data-type]').forEach(el=>{
    el.addEventListener('click', ()=>{ state = {view:'region', type:el.dataset.type, region:null}; render(); });
  });
}

function renderRegion() {
  let html = `<a class="back-link" id="toHome">&larr; 返回首頁</a><h1>${state.type} — 請選地區</h1><div class="grid">`;
  for (const rg of REGIONS) {
    const cnt = countFor(state.type, rg);
    if (cnt > 0) html += `<div class="tile type-${state.type}" data-region="${rg}"><div class="name">${rg}</div><div class="count">${cnt} 筆</div></div>`;
    else html += `<div class="tile zero"><div class="name">${rg}</div><div class="count">0 筆</div></div>`;
  }
  html += '</div>';
  app.innerHTML = html;
  document.getElementById('toHome').addEventListener('click', ()=>{ state={view:'home',type:null,region:null}; render(); });
  app.querySelectorAll('.tile[data-region]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.view='detail'; state.region=el.dataset.region; render(); });
  });
}

function renderDetail() {
  const rows = rowsFor(state.type, state.region);
  let html = `<a class="back-link" id="toRegion">&larr; 返回地區選擇</a><h1>${state.type} × ${state.region}</h1><div class="subtitle">共 ${rows.length} 筆(可直接點文字編輯)</div><div class="card-grid">`;
  for (const r of rows) {
    html += `<div class="card" data-idx="${r._idx}">`;
    html += `<div class="cname" contenteditable="true" data-field="name">${escapeHtml(r.name)}</div>`;
    for (const f of ["feat","price","env","who","source"]) {
      html += `<div class="field"><b>${FIELD_LABELS[f]}:</b> <span contenteditable="true" data-field="${f}">${escapeHtml(r[f]||'')}</span></div>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  app.innerHTML = html;
  document.getElementById('toRegion').addEventListener('click', ()=>{ state.view='region'; render(); });
  app.querySelectorAll('.card [contenteditable]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const card = el.closest('.card');
      const idx = parseInt(card.dataset.idx,10);
      const field = el.dataset.field;
      DATA[idx][field] = el.textContent.trim();
      persist();
    });
  });
}

function escapeHtml(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  if (state.view==='home') renderHome();
  else if (state.view==='region') renderRegion();
  else renderDetail();
}

document.getElementById('btnSave').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '店家景點總表_已編輯.json';
  a.click();
});

function toCsvField(v) {
  v = v==null ? '' : String(v);
  if (/[",\n]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
  return v;
}
document.getElementById('btnSaveCsv').addEventListener('click', ()=>{
  const headers = ["地點或店名","區域","類型","主要特色或推薦品項","價格或消費範圍","用餐環境或景點描述","適合對象與方案","資料來源"];
  const lines = [headers.map(toCsvField).join(',')];
  for (const r of DATA) {
    lines.push([r.name,r.region_raw,r.type,r.feat,r.price,r.env,r.who,r.source].map(toCsvField).join(','));
  }
  const blob = new Blob(['﻿' + lines.join('\r\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '店家景點總表_已編輯.csv';
  a.click();
});

document.getElementById('fileImport').addEventListener('change', (ev)=>{
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      DATA = JSON.parse(reader.result);
      persist();
      state = {view:'home', type:null, region:null};
      render();
      alert('匯入成功,已載入 ' + DATA.length + ' 筆資料');
    } catch(e) { alert('匯入失敗:檔案格式不正確'); }
  };
  reader.readAsText(file, 'utf-8');
});

document.getElementById('btnCopy').addEventListener('click', ()=>{
  const text = JSON.stringify(DATA, null, 2);
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.setAttribute('readonly', '');
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, text.length);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) { ok = false; }
  document.body.removeChild(ta);
  const el = document.getElementById('saveStatus');
  if (ok) { el.textContent = '已複製到剪貼簿,可貼到備忘錄/雲端筆記'; }
  else { el.textContent = '複製失敗,請改用下載按鈕'; }
  setTimeout(()=>{ el.textContent=''; }, 3000);
});

render();
</script>
</body>
</html>
